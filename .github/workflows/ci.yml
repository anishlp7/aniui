name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: "cli/package-lock.json"

      - name: Install CLI dependencies
        working-directory: cli
        run: npm ci

      - name: TypeScript typecheck (CLI)
        working-directory: cli
        run: npx tsc --noEmit

  test-cli:
    name: Test CLI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: "cli/package-lock.json"

      - name: Install CLI dependencies
        working-directory: cli
        run: npm ci

      - name: Run CLI tests
        working-directory: cli
        run: npm test

  test-components:
    name: Test Components
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: "package-lock.json"

      - name: Install dependencies
        run: npm ci

      - name: Run component tests
        run: npx jest --passWithNoTests --ci

  docs-build:
    name: Docs Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: "docs/package-lock.json"

      - name: Install docs dependencies
        working-directory: docs
        run: npm ci

      - name: Build docs
        working-directory: docs
        run: npm run build

  lint-components:
    name: Lint Components
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: No StyleSheet.create usage
        run: |
          if grep -r "StyleSheet.create" components/ui/; then
            echo "ERROR: StyleSheet.create found in components!"
            exit 1
          fi
          echo "OK: No StyleSheet.create found"

      - name: No default exports
        run: |
          if grep -r "export default" components/ui/; then
            echo "ERROR: Default exports found in components!"
            exit 1
          fi
          echo "OK: No default exports found"

      - name: Component line count check (max 80 lines)
        run: |
          failed=0
          for f in components/ui/*.tsx; do
            lines=$(wc -l < "$f")
            if [ "$lines" -gt 80 ]; then
              echo "WARN: $f has $lines lines (limit: 80)"
              failed=1
            fi
          done
          if [ "$failed" -eq 1 ]; then
            echo ""
            echo "WARNING: Some components exceed 80-line limit"
            echo "Consider simplifying or splitting these components"
          fi
          echo "Line count check complete"
