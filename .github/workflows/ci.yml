name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: TypeScript Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"

      - name: Install CLI dependencies
        working-directory: cli
        run: npm ci

      - name: TypeScript typecheck (CLI)
        working-directory: cli
        run: npx tsc --noEmit

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"

      - name: Install CLI dependencies
        working-directory: cli
        run: npm ci

      - name: Run tests
        working-directory: cli
        run: npm test

  lint-components:
    name: Lint Components
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: No StyleSheet.create usage
        run: |
          if grep -r "StyleSheet.create" components/; then
            echo "ERROR: StyleSheet.create found in components!"
            exit 1
          fi
          echo "OK: No StyleSheet.create found"

      - name: No default exports
        run: |
          if grep -r "export default" components/; then
            echo "ERROR: Default exports found in components!"
            exit 1
          fi
          echo "OK: No default exports found"
